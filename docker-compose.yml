version: "3.8"

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "8383:3000"
    volumes:
      - /home/r-server/docker/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=100.84.224.18:8383,localhost,127.0.0.1

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "100.84.224.18:8080:80"
    volumes:
      - /home/r-server/docker/vaultwarden:/data
    environment:
      - WEB_VAULT_ENABLED=true
      - LOG_FILE=/data/vaultwarden.log

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - /home/r-server/docker/uptime-kuma:/app/data

  glances:
    image: nicolargo/glances:ubuntu-latest-full
    container_name: glances
    restart: unless-stopped
    ports:
      - "61208:61208"
    environment:
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    pid: host
    network_mode: host

  immich-postgres:
    image: tensorchord/pgvecto-rs:pg16-v0.2.0
    container_name: immich-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: aarz1947
      POSTGRES_USER: immich
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: --data-checksums
    volumes:
      - /home/r-server/docker/immich-db:/var/lib/postgresql/data
    

  immich-redis:
    image: valkey/valkey:9
    container_name: immich-redis
    restart: always
    healthcheck:
      test: valkey-cli ping || exit 1
    volumes:
      - /home/r-server/docker/immich-redis:/data

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: always
    volumes:
      - /mnt/storage/immich/model-cache:/cache
      - /home/r-server/docker/immich/.env:/env:ro
    env_file:
      - /home/r-server/docker/immich/.env

  immich:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich
    restart: always
    ports:
      - "2283:2283"
    volumes:
      - /mnt/storage/immich/upload:/data/upload
      - /mnt/storage/immich/library:/data/library
      - /mnt/storage/immich/encoded-video:/data/encoded-video
      - /mnt/storage/immich/profile:/data/profile
      - /mnt/storage/immich/thumbs:/data/thumbs
      - /mnt/storage/immich/backups:/data/backups
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - /home/r-server/docker/immich/.env
    environment:
      DB_HOSTNAME: immich-postgres
      DB_USERNAME: immich
      DB_PASSWORD: aarz1947
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich-redis
      IMMICH_ADMIN_USER_EMAIL: aaryantahir8918@gmail.com
      IMMICH_ADMIN_USER_PASSWORD: aarz1947
    depends_on:
      immich-postgres:
        condition: service_started
      immich-redis:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:2283/api/server/ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

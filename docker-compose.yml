name: r-server

# CONSOLIDATED STACK — single source of truth so external-network drift can't recur.
# All services share `r-server_default` (defined here, NOT external). The previous
# split between /home/r-server/docker-compose.yml and /home/r-server/docker/nextcloud-compose.yml
# caused three containers (nextcloud, vaultwarden, collabora) to lose bridge attachment
# on 2026-06-20 because the nextcloud stack referenced r-server_default as external
# and could come up before/after the network existed.

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "8383:3000"
    volumes:
      - /home/r-server/docker/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=100.84.224.18:8383,localhost,127.0.0.1
    networks:
      - r-server_default

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "100.84.224.18:8080:80"
    volumes:
      - /home/r-server/docker/vaultwarden:/data
    environment:
      - WEB_VAULT_ENABLED=true
      - LOG_FILE=/data/vaultwarden.log
    networks:
      - r-server_default

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - /home/r-server/docker/uptime-kuma:/app/data
    networks:
      - r-server_default

  glances:
    image: nicolargo/glances:ubuntu-latest-full
    container_name: glances
    restart: unless-stopped
    ports:
      - "100.84.224.18:61208:61208"
    environment:
      - GLANCES_OPT=-w
    pid: host

  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "100.84.224.18:9080:80"
    volumes:
      # USER DATA on ext4 (was exFAT — broke perms, Nextcloud refused to start)
      - /var/lib/nextcloud-data:/var/www/html/data
      - /mnt/storage:/mnt/storage:ro
    environment:
      NEXTCLOUD_ADMIN_USER: aaryantahir8918@gmail.com
      NEXTCLOUD_ADMIN_PASSWORD: aarz1947
      NEXTCLOUD_DATA_DIR: /var/www/html/data
      NEXTCLOUD_TRUSTED_DOMAINS: 100.84.224.18 localhost 127.0.0.1
      NEXTCLOUD_UPDATE: 0
      PHP_UPLOAD_LIMIT: 16G
      PHP_MAX_TIME: 3600
      PHP_MEMORY_LIMIT: 512M
      REDIS_HOST: nextcloud-redis
      REDIS_HOST_PORT: 6379
      UID: 1000
      GID: 1000
    depends_on:
      - redis
    networks:
      - r-server_default

  redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    volumes:
      - nextcloud_redis:/data
    networks:
      - r-server_default

  collabora:
    image: collabora/code:latest
    container_name: collabora
    restart: unless-stopped
    ports:
      - "100.84.224.18:9980:9980"
    environment:
      - extra_params=--o:ssl.enable=false
      - DONT_GEN_SSL_CERT=true
    networks:
      - r-server_default

volumes:
  nextcloud_redis:

networks:
  r-server_default:
    name: r-server_default
    driver: bridge
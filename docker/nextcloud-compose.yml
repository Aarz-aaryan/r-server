name: nextcloud

services:
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "100.84.224.18:9080:80"
    volumes:
      # Mount ENTIRE Nextcloud web root on 3TB HDD (avoids anonymous Docker volume)
      # Layout: /mnt/storage/nextcloud/data/{data,custom_apps,config} + image PHP source
      - /mnt/storage/nextcloud/data:/var/www/html
      # Read-only access to all other HDD storage
      - /mnt/storage:/mnt/storage:ro
    environment:
      NEXTCLOUD_ADMIN_USER: aaryantahir8918@gmail.com
      NEXTCLOUD_ADMIN_PASSWORD: aarz1947
      NEXTCLOUD_DATA_DIR: /var/www/html/data
      NEXTCLOUD_TRUSTED_DOMAINS: 100.84.224.18 localhost 127.0.0.1
      PHP_UPLOAD_LIMIT: 16G
      PHP_MAX_TIME: 3600
      PHP_MEMORY_LIMIT: 512M
      REDIS_HOST: nextcloud-redis
      REDIS_HOST_PORT: 6379
      UID: 1000
      GID: 1000
    depends_on:
      - redis
    networks:
      - r-server_default

  redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    volumes:
      - nextcloud_redis:/data
    networks:
      - r-server_default

  collabora:
    image: collabora/code:latest
    container_name: collabora
    restart: unless-stopped
    ports:
      - "100.84.224.18:9980:9980"
    environment:
      - extra_params=--o:ssl.enable=false
      - DONT_GEN_SSL_CERT=true
    networks:
      - r-server_default

volumes:
  nextcloud_redis:

networks:
  r-server_default:
    external: true